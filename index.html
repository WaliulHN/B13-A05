<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - GitHub Issues Tracker</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="login-page">
  
  <div class="login-container">

    <div class="login-header">
      <div class="login-logo">
        <i class="fab fa-github"></i>
      </div>
      <h1 class="login-title">GitHub Issues Tracker</h1>
      <p class="login-subtitle">Sign in to manage your issues</p>
    </div>

   
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-input" 
    placeholder="Enter username" required autocomplete="username">
    </div>
      
      <div class="form-group">
    <label for="password" class="form-label">Password</label>
    <input type="password" id="password" class="form-input" 
          placeholder="Enter password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block">
    <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

   
    <div class="login-credentials">
      <p class="credentials-text">
    <strong>Demo Credentials:</strong><br>
        Username: <code class="credential-code">admin</code><br>
        Password: <code class="credential-code">admin123</code>
      </p>
    </div>

  
    <div id="errorMsg" class="error-message hidden"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
